name: Build & Commit Dist

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'dist/**'  # Don't re-trigger when we commit dist

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Temporarily move API route (not compatible with static export)
        run: mv app/api app_api_temp

      - name: Build static export
        run: npm run build

      - name: Restore API route
        run: mv app_api_temp app/api

      - name: Commit and push dist folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --cached --quiet || git commit -m "chore: update static build [skip ci]"
          git push

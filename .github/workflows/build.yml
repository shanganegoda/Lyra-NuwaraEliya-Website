name: Build & Commit Dist

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'dist/**'  # Don't re-trigger when we commit dist

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Temporarily move API route (not compatible with static export)
        run: |
          if [ -d "app/api" ]; then
            mv app/api app_api_temp
          fi

      - name: Build static export
        run: npm run build

      - name: Restore API route
        run: |
          if [ -d "app_api_temp" ]; then
            mv app_api_temp app/api
          fi

      - name: Commit and push dist folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add dist/
          git diff --cached --quiet || git commit -m "chore: update static build [skip ci]"
          git push origin main
